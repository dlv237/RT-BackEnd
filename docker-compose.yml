version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rt-backend:latest
    container_name: rt-backend
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection({host:'127.0.0.1', port: process.env.PORT||3000}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
